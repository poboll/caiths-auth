<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caiths Auth | Unified Gateway</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23111'/><path d='M 65 35 A 25 25 0 1 0 65 65' fill='none' stroke='%23fff' stroke-width='12' stroke-linecap='round'/></svg>">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #111111;
            --text-secondary: #666666;
            --border-color: #eaeaea;
            --btn-bg: #000000;
            --btn-text: #ffffff;
            --btn-hover: #333333;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-btn: 0 4px 14px 0 rgba(0, 0, 0, 0.1);
            --shadow-btn-hover: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --text-primary: #ededed;
                --text-secondary: #a1a1a1;
                --border-color: #333333;
                --btn-bg: #ffffff;
                --btn-text: #000000;
                --btn-hover: #cccccc;
                --shadow-btn: 0 4px 14px 0 rgba(255, 255, 255, 0.1);
                --shadow-btn-hover: 0 6px 20px rgba(255, 255, 255, 0.15);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background-color 0.3s ease, color 0.3s ease;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100vh;
            background-image: linear-gradient(var(--border-color) 1px, transparent 1px), linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center top;
            opacity: 0.5;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 80%);
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 80%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 24px;
            width: 100%;
            box-sizing: border-box;
        }

        header {
            padding: 40px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-primary);
        }

        .logo svg {
            width: 28px;
            height: 28px;
        }

        .logo svg rect { fill: var(--text-primary); }
        .logo svg path { stroke: var(--bg-color); }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 80px 0;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            border-radius: 999px;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 32px;
            letter-spacing: 0.01em;
            box-shadow: var(--shadow-sm);
            animation: fade-in-up 0.8s ease-out;
        }

        .hero-badge::before {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--text-primary);
        }

        h1 {
            font-size: clamp(3rem, 6vw, 5rem);
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -0.04em;
            margin: 0 0 24px 0;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fade-in-up 0.8s ease-out 0.1s backwards;
        }

        p.subtitle {
            font-size: clamp(1.125rem, 2vw, 1.5rem);
            color: var(--text-secondary);
            max-width: 600px;
            line-height: 1.5;
            margin: 0 0 48px 0;
            letter-spacing: -0.01em;
            animation: fade-in-up 0.8s ease-out 0.2s backwards;
        }

        .actions {
            display: flex;
            gap: 16px;
            animation: fade-in-up 0.8s ease-out 0.3s backwards;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 28px;
            height: 48px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            font-family: inherit;
        }

        .btn-primary {
            background-color: var(--btn-bg);
            color: var(--btn-text);
            box-shadow: var(--shadow-btn);
        }

        .btn-primary:hover {
            background-color: var(--btn-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-btn-hover);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: var(--border-color);
        }

        footer {
            padding: 40px 0;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.875rem;
            border-top: 1px solid var(--border-color);
        }

        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="logo">
                <svg viewBox="0 0 100 100">
                    <rect width="100" height="100" rx="20"/>
                    <path d="M 65 35 A 25 25 0 1 0 65 65" fill="none" stroke-width="12" stroke-linecap="round"/>
                </svg>
                Caiths
            </a>
        </header>
    </div>

    <main class="container">
        <div class="hero-badge">v1.0 Online</div>
        <h1>Unified identity.<br>Absolute security.</h1>
        <p class="subtitle">Caiths Auth is the unified authentication gateway for the Caiths network. Seamless, secure, and built for modern developers.</p>
        <div class="actions">
            <a href="/docs" class="btn btn-primary">View Documentation</a>
            <a href="mailto:support@caiths.com" class="btn btn-secondary">Contact Sales</a>
        </div>
    </main>

    <footer class="container">
        &copy; <script>document.write(new Date().getFullYear())</script> Caiths Inc. All rights reserved.
    </footer>
</body>
</html>
